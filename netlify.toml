# netlify.toml
#
# Tells Netlify where the static site and the serverless function live.
# command = "" is critical — it tells Netlify there is NO build step.
# Without this, Netlify may try to detect and run a framework build tool,
# then hang or fail waiting for a build that should never happen.

[build]
  command = ""
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
